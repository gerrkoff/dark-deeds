name: Tests Integration

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 02:00 UTC
    - cron: '0 2 * * *'

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Deploy staging with master version
        id: operation
        run: |
          OUTPUT=$(./ci/workflows/drone-job-trigger.sh \
            "deploy-staging" \
            "master" \
            "${{ github.ref_name }}" \
            "${{ secrets.DRONE_SERVER }}" \
            "${{ secrets.DRONE_TOKEN }}" \
            "${{ github.repository }}")
          echo "$OUTPUT"
          echo "$OUTPUT" | tail -1 >> $GITHUB_OUTPUT
      - name: Wait for staging deployment to complete
        run: |
          ./ci/workflows/drone-job-wait.sh \
            "${{ steps.operation.outputs.build_number }}" \
            "${{ secrets.DRONE_SERVER }}" \
            "${{ secrets.DRONE_TOKEN }}" \
            "${{ github.repository }}"

  run-e2e-tests:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Wait before running tests
        run: |
          echo "Waiting 30 seconds before starting E2E tests..."
          sleep 30
      - name: Trigger E2E tests
        id: operation
        run: |
          OUTPUT=$(./ci/workflows/drone-job-trigger.sh \
            "run-e2e-tests" \
            "-" \
            "${{ github.ref_name }}" \
            "${{ secrets.DRONE_SERVER }}" \
            "${{ secrets.DRONE_TOKEN }}" \
            "${{ github.repository }}")
          echo "$OUTPUT"
          echo "$OUTPUT" | tail -1 >> $GITHUB_OUTPUT
      - name: Wait for E2E tests to complete
        run: |
          ./ci/workflows/drone-job-wait.sh \
            "${{ steps.operation.outputs.build_number }}" \
            "${{ secrets.DRONE_SERVER }}" \
            "${{ secrets.DRONE_TOKEN }}" \
            "${{ github.repository }}"

  run-load-tests:
    runs-on: ubuntu-latest
    needs: run-e2e-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Trigger load tests
        id: operation
        run: |
          OUTPUT=$(./ci/workflows/drone-job-trigger.sh \
            "run-load-tests" \
            "-" \
            "${{ github.ref_name }}" \
            "${{ secrets.DRONE_SERVER }}" \
            "${{ secrets.DRONE_TOKEN }}" \
            "${{ github.repository }}")
          echo "$OUTPUT"
          echo "$OUTPUT" | tail -1 >> $GITHUB_OUTPUT
      - name: Wait for load tests to complete
        run: |
          ./ci/workflows/drone-job-wait.sh \
            "${{ steps.operation.outputs.build_number }}" \
            "${{ secrets.DRONE_SERVER }}" \
            "${{ secrets.DRONE_TOKEN }}" \
            "${{ github.repository }}" \
            "1800"
